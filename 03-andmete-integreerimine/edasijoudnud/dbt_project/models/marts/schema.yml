version: 2

models:
  - name: dim_users
    description: "Kasutajate dimensioonitabel"
    columns:
      - name: user_key
        description: "Kasutaja unikaalne tunnusvoti (UUID)"
        tests:
          - unique
          - not_null
      - name: user_id
        tests:
          - unique
          - not_null

  - name: fct_posts
    description: "Postituste faktitabel kasutajadimensiooniga"
    columns:
      - name: post_id
        description: "Postituse unikaalne tunnus"
        tests:
          - unique
          - not_null
      - name: user_key
        description: "Viide kasutajadimensioonile"
        tests:
          - not_null

  - name: user_post_summary
    description: "Kasutajate postituste kokkuvote (inkrementaalne)"
    columns:
      - name: user_key
        tests:
          - unique
          - not_null
